name: MyDay Reminders

# Fires the daily MyDay push notifications via the OneSignal REST API:
# Bible verse, to-do list, motivational quote, prayer (3x/day), and workout.
# All times below are UTC, converted from Africa/Johannesburg (UTC+2, no DST),
# offset 7 minutes past the hour to dodge GitHub Actions' top-of-hour congestion.
#
# Requires two repo secrets (Settings > Secrets and variables > Actions):
#   ONESIGNAL_APP_ID         - public App ID from OneSignal
#   ONESIGNAL_REST_API_KEY   - REST API key from OneSignal (never expose this client-side)
#
# To change a reminder time: edit the matching cron line below and commit.
# The in-app Settings time pickers are local-display-only and do NOT update this file.

on:
  schedule:
    - cron: '7 8 * * *'   # 10:00 AM SAST - Bible verse
    - cron: '7 9 * * *'   # 11:00 AM SAST - Set to-do list
    - cron: '7 13 * * *'  # 3:00 PM SAST  - Motivational quote
    - cron: '7 10 * * *'  # 12:00 PM SAST - Prayer
    - cron: '7 15 * * *'  # 5:00 PM SAST  - Prayer
    - cron: '7 18 * * *'  # 8:00 PM SAST  - Prayer
    - cron: '7 16 * * *'  # 6:00 PM SAST  - Workout (placeholder, edit to your time)
  workflow_dispatch:
    inputs:
      which:
        description: 'Send a specific reminder right now (for testing)'
        type: choice
        options: [verse, todo, quote, prayer, workout]
        required: true

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Bible verse reminder
        if: github.event.schedule == '7 8 * * *' || github.event.inputs.which == 'verse'
        run: |
          curl -sf -X POST https://api.onesignal.com/notifications \
            -H "Content-Type: application/json" \
            -H "Authorization: Key ${{ secrets.ONESIGNAL_REST_API_KEY }}" \
            -d '{
              "app_id": "${{ secrets.ONESIGNAL_APP_ID }}",
              "included_segments": ["Subscribed Users"],
              "headings": {"en": "MyDay"},
              "contents": {"en": "📖 Today'\''s verse is ready"}
            }'

      - name: To-do list reminder
        if: github.event.schedule == '7 9 * * *' || github.event.inputs.which == 'todo'
        run: |
          curl -sf -X POST https://api.onesignal.com/notifications \
            -H "Content-Type: application/json" \
            -H "Authorization: Key ${{ secrets.ONESIGNAL_REST_API_KEY }}" \
            -d '{
              "app_id": "${{ secrets.ONESIGNAL_APP_ID }}",
              "included_segments": ["Subscribed Users"],
              "headings": {"en": "MyDay"},
              "contents": {"en": "✅ Time to set your to-do list"}
            }'

      - name: Motivational quote reminder
        if: github.event.schedule == '7 13 * * *' || github.event.inputs.which == 'quote'
        run: |
          curl -sf -X POST https://api.onesignal.com/notifications \
            -H "Content-Type: application/json" \
            -H "Authorization: Key ${{ secrets.ONESIGNAL_REST_API_KEY }}" \
            -d '{
              "app_id": "${{ secrets.ONESIGNAL_APP_ID }}",
              "included_segments": ["Subscribed Users"],
              "headings": {"en": "MyDay"},
              "contents": {"en": "✨ Today'\''s motivational quote is ready"}
            }'

      - name: Prayer reminder (12PM)
        if: github.event.schedule == '7 10 * * *' || github.event.inputs.which == 'prayer'
        run: |
          curl -sf -X POST https://api.onesignal.com/notifications \
            -H "Content-Type: application/json" \
            -H "Authorization: Key ${{ secrets.ONESIGNAL_REST_API_KEY }}" \
            -d '{
              "app_id": "${{ secrets.ONESIGNAL_APP_ID }}",
              "included_segments": ["Subscribed Users"],
              "headings": {"en": "MyDay"},
              "contents": {"en": "🙏 Prayer time"}
            }'

      - name: Prayer reminder (5PM)
        if: github.event.schedule == '7 15 * * *' || github.event.inputs.which == 'prayer'
        run: |
          curl -sf -X POST https://api.onesignal.com/notifications \
            -H "Content-Type: application/json" \
            -H "Authorization: Key ${{ secrets.ONESIGNAL_REST_API_KEY }}" \
            -d '{
              "app_id": "${{ secrets.ONESIGNAL_APP_ID }}",
              "included_segments": ["Subscribed Users"],
              "headings": {"en": "MyDay"},
              "contents": {"en": "🙏 Prayer time"}
            }'

      - name: Prayer reminder (8PM)
        if: github.event.schedule == '7 18 * * *' || github.event.inputs.which == 'prayer'
        run: |
          curl -sf -X POST https://api.onesignal.com/notifications \
            -H "Content-Type: application/json" \
            -H "Authorization: Key ${{ secrets.ONESIGNAL_REST_API_KEY }}" \
            -d '{
              "app_id": "${{ secrets.ONESIGNAL_APP_ID }}",
              "included_segments": ["Subscribed Users"],
              "headings": {"en": "MyDay"},
              "contents": {"en": "🙏 Prayer time"}
            }'

      - name: Workout reminder
        if: github.event.schedule == '7 16 * * *' || github.event.inputs.which == 'workout'
        run: |
          curl -sf -X POST https://api.onesignal.com/notifications \
            -H "Content-Type: application/json" \
            -H "Authorization: Key ${{ secrets.ONESIGNAL_REST_API_KEY }}" \
            -d '{
              "app_id": "${{ secrets.ONESIGNAL_APP_ID }}",
              "included_segments": ["Subscribed Users"],
              "headings": {"en": "MyDay"},
              "contents": {"en": "💪 Workout time"}
            }'
