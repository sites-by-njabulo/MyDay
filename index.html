<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>MyDay</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0c">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<!--
  OneSignal Web Push SDK.
  Replace "YOUR-ONESIGNAL-APP-ID" below with the public App ID from your OneSignal
  dashboard (Settings > Keys & IDs). This ID is safe to expose client-side.
  See CLAUDE.md for the full setup checklist.
-->
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function (OneSignal) {
    await OneSignal.init({
      appId: "YOUR-ONESIGNAL-APP-ID",
      serviceWorkerPath: "sw.js",
      notifyButton: { enable: false }
    });
  });
</script>
</head>
<body>

<!-- SPLASH VIEW -->
<div id="splash-view">
  <img src="icons/logo-myday.png" alt="MyDay" class="splash-logo">
</div>

<!-- LOCK VIEW -->
<div id="lock-view" class="hidden">
  <div class="lock-card">
    <img src="icons/logo-mark.png" alt="" class="lock-mark">
    <h1 class="lock-title">MyDay</h1>
    <p class="lock-sub">Enter your PIN</p>
    <div class="pin-dots" id="pin-dots">
      <span class="pin-dot"></span>
      <span class="pin-dot"></span>
      <span class="pin-dot"></span>
      <span class="pin-dot"></span>
    </div>
    <div class="pin-keypad" id="pin-keypad">
      <button type="button" class="pin-key" data-key="1">1</button>
      <button type="button" class="pin-key" data-key="2">2</button>
      <button type="button" class="pin-key" data-key="3">3</button>
      <button type="button" class="pin-key" data-key="4">4</button>
      <button type="button" class="pin-key" data-key="5">5</button>
      <button type="button" class="pin-key" data-key="6">6</button>
      <button type="button" class="pin-key" data-key="7">7</button>
      <button type="button" class="pin-key" data-key="8">8</button>
      <button type="button" class="pin-key" data-key="9">9</button>
      <span class="pin-key pin-key-empty" aria-hidden="true"></span>
      <button type="button" class="pin-key" data-key="0">0</button>
      <button type="button" class="pin-key pin-key-delete" id="pin-delete" aria-label="Delete">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 5h12a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H7l-5-7z"/><line x1="12" y1="10" x2="17" y2="15"/><line x1="17" y1="10" x2="12" y2="15"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- APP VIEW -->
<div id="app-view" class="hidden">

  <div class="app-shell">

    <nav id="main-nav">
      <div class="nav-brand">
        <img src="icons/logo-mark.png" alt="" class="nav-brand-mark"><span class="nav-brand-text">MyDay</span>
        <button class="sidebar-toggle-btn" id="sidebar-toggle-btn" aria-label="Collapse sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
      </div>
      <button class="nav-item active" data-section="home">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-12h6v12"/></svg></span>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-item" data-section="todo">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 12.5l2.5 2.5L16 9"/></svg></span>
        <span class="nav-label">To-Do</span>
      </button>
      <button class="nav-item" data-section="faith">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5.5c2-1 5-1 8 0v14c-3-1-6-1-8 0z"/><path d="M20 5.5c-2-1-5-1-8 0v14c3-1 6-1 8 0z"/></svg></span>
        <span class="nav-label">Bible</span>
      </button>
      <button class="nav-item" data-section="workout">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="9" width="4" height="6" rx="1"/><rect x="18" y="9" width="4" height="6" rx="1"/><line x1="6" y1="12" x2="18" y2="12"/></svg></span>
        <span class="nav-label">Workout</span>
      </button>
      <button class="nav-item nav-item-desktop-only" data-section="challenge">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="0.8" fill="currentColor" stroke="none"/></svg></span>
        <span class="nav-label">Challenge</span>
      </button>
      <button class="nav-item nav-item-desktop-only" data-section="notes">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h9l5 5v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M14 3v5h5"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></svg></span>
        <span class="nav-label">Notes</span>
      </button>
      <button class="nav-item" data-section="gameplan">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3.5v17"/><path d="M5 4.5c2-1.2 4-1.2 6 0s4 1.2 6 0v9c-2 1.2-4 1.2-6 0s-4-1.2-6 0z"/></svg></span>
        <span class="nav-label">Game Plan</span>
      </button>
      <button class="nav-item" data-section="you">
        <span class="nav-icon nav-avatar">N</span>
        <span class="nav-label">You</span>
      </button>
    </nav>

    <main id="main-content">
      <section class="page active" id="page-home" data-page="home"></section>
      <section class="page" id="page-todo" data-page="todo"></section>
      <section class="page" id="page-faith" data-page="faith"></section>
      <section class="page" id="page-workout" data-page="workout"></section>
      <section class="page" id="page-video" data-page="video"></section>
      <section class="page" id="page-notes" data-page="notes"></section>
      <section class="page" id="page-gameplan" data-page="gameplan"></section>
      <section class="page" id="page-you" data-page="you"></section>
      <section class="page" id="page-settings" data-page="settings"></section>
    </main>

  </div>

  <button class="voice-fab hidden" id="voice-fab" aria-label="Add task by voice">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><line x1="12" y1="18" x2="12" y2="21"/><line x1="8" y1="21" x2="16" y2="21"/></svg>
  </button>
  <button class="todo-fab hidden" id="todo-fab" aria-label="Add task">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
  <div id="notes-mobile-bar" class="hidden"></div>
  <div id="todo-sheet-root"></div>
  <button class="sidebar-reopen-btn" id="sidebar-reopen-btn" aria-label="Open sidebar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
  </button>

</div>

<script src="data/verses.js"></script>
<script src="data/quotes.js"></script>
<!--
  Supabase client — used for cross-device real-time sync (see CLAUDE.md).
  If this fails to load (offline, CDN blocked, etc.) app.js detects that
  window.supabase is missing and falls back to localStorage-only mode.
-->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="app.js"></script>
</body>
</html>
