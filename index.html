<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>MyDay</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#18181b">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<!--
  OneSignal Web Push SDK.
  Replace "YOUR-ONESIGNAL-APP-ID" below with the public App ID from your OneSignal
  dashboard (Settings > Keys & IDs). This ID is safe to expose client-side.
  See CLAUDE.md for the full setup checklist.
-->
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function (OneSignal) {
    await OneSignal.init({
      appId: "YOUR-ONESIGNAL-APP-ID",
      serviceWorkerPath: "sw.js",
      notifyButton: { enable: false }
    });
  });
</script>
</head>
<body>

<!-- LOCK VIEW -->
<div id="lock-view">
  <div class="lock-card">
    <div class="lock-mark">M</div>
    <h1 class="lock-title">MyDay</h1>
    <p class="lock-sub">Enter your password to continue</p>
    <form id="lock-form" autocomplete="off">
      <input type="password" id="lock-input" placeholder="Password" autocomplete="off" />
      <button type="submit">Unlock</button>
    </form>
    <p class="lock-error" id="lock-error">Incorrect password. Try again.</p>
  </div>
</div>

<!-- APP VIEW -->
<div id="app-view" class="hidden">

  <div class="app-shell">

    <nav id="main-nav">
      <div class="nav-brand"><span class="nav-brand-mark">M</span><span class="nav-brand-text">MyDay</span></div>
      <button class="nav-item active" data-section="home">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-12h6v12"/></svg></span>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-item" data-section="todo">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 12.5l2.5 2.5L16 9"/></svg></span>
        <span class="nav-label">To-Do</span>
      </button>
      <button class="nav-item" data-section="faith">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20.5s-7.2-4.4-9.5-8.6C1 9 2 5.8 5 4.8c2-0.7 4 0.3 5 2 1-1.7 3-2.7 5-2 3 1 4 4.2 2.5 7.1-2.3 4.2-9.5 8.6-9.5 8.6z"/></svg></span>
        <span class="nav-label">Faith</span>
      </button>
      <button class="nav-item" data-section="workout">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="9" width="4" height="6" rx="1"/><rect x="18" y="9" width="4" height="6" rx="1"/><line x1="6" y1="12" x2="18" y2="12"/></svg></span>
        <span class="nav-label">Workout</span>
      </button>
      <button class="nav-item" data-section="video">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M10.5 9l4.5 3-4.5 3V9z" fill="currentColor" stroke="none"/></svg></span>
        <span class="nav-label">Videos</span>
      </button>
      <button class="nav-item" data-section="challenge">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="0.8" fill="currentColor" stroke="none"/></svg></span>
        <span class="nav-label">Challenge</span>
      </button>
      <button class="nav-item" data-section="calendar">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><line x1="3" y1="9.5" x2="21" y2="9.5"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/></svg></span>
        <span class="nav-label">Calendar</span>
      </button>
      <button class="nav-item" data-section="settings">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 13a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V19a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
        <span class="nav-label">Settings</span>
      </button>
    </nav>

    <main id="main-content">
      <section class="page active" id="page-home" data-page="home"></section>
      <section class="page" id="page-todo" data-page="todo"></section>
      <section class="page" id="page-faith" data-page="faith"></section>
      <section class="page" id="page-workout" data-page="workout"></section>
      <section class="page" id="page-video" data-page="video"></section>
      <section class="page" id="page-challenge" data-page="challenge"></section>
      <section class="page" id="page-calendar" data-page="calendar"></section>
      <section class="page" id="page-settings" data-page="settings"></section>
    </main>

  </div>

</div>

<script src="data/verses.js"></script>
<script src="data/quotes.js"></script>
<script src="app.js"></script>
</body>
</html>
